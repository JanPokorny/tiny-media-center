# Dev tools and tasks (https://mise.jdx.dev): `mise install`, then e.g.
# `mise run build`. Native build dependencies still come from the distro:
# libmpv headers and, for the default from-source SDL3, cmake plus its
# Linux build dependencies (see README).

[tools]
rust = { version = "1.94", components = "clippy" }
gum = "latest"

[tasks.build]
description = "Build the release binary for this machine"
run = "cargo build --release"

[tasks.run]
description = "Build and run in the current directory"
run = "cargo run --release"

[tasks.check]
description = "Lint with clippy"
run = "cargo clippy"

[tasks.release]
description = "Release: pick a version bump, then commit, tag and push"
shell = "bash -c"
run = '''
# Cuts a release: the pushed v* tag makes GitHub Actions build the portable
# binary, attach it to a GitHub Release, and trigger the Copr rebuild.
set -euo pipefail

[ "$(git branch --show-current)" = main ] ||
    { echo "releases are cut from main (Copr builds the tip of main)" >&2; exit 1; }
git diff --quiet && git diff --cached --quiet ||
    { echo "working tree is not clean" >&2; exit 1; }

current=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
IFS=. read -r major minor patch <<<"$current"
choice=$(gum choose --header "Release (current version: $current)" \
    "patch  $major.$minor.$((patch + 1))" \
    "minor  $major.$((minor + 1)).0" \
    "major  $((major + 1)).0.0")
version=${choice##* }

sed -i "s/^version = \".*\"/version = \"$version\"/" Cargo.toml
cargo update --workspace  # sync the version into Cargo.lock
git commit -am "Release $version"
git tag "v$version"
git push origin main "v$version"
'''

[tasks.build-portable]
description = "Build the portable Releases binary locally (Debian 12 container, needs docker/podman)"
shell = "bash -c"
run = '''
# Builds the same portable binary that the release workflow publishes to
# GitHub Releases (useful to reproduce it locally): SDL3 and all Rust deps
# statically linked, glibc and libmpv dynamic. The Debian 12 container pins the two
# runtime requirements as low as practical while still linking the current
# libmpv ABI (libmpv.so.2, mpv >= 0.35): the result runs on any x86_64
# distro with glibc >= 2.36 (Debian 12 / Ubuntu 23.04 / Fedora 37 or newer)
# and mpv installed.
#
# The container needs the dev headers of every SDL backend we want compiled
# in -- SDL dlopens the actual libraries at runtime, so backends missing on
# the build machine are silently absent from the binary forever.
set -euo pipefail

engine=$(command -v podman || command -v docker)
mkdir -p dist

"$engine" run --rm \
    -v "$PWD:/src" \
    -v tiny-media-center-cargo:/root/.cargo \
    -w /src \
    debian:12 \
    bash -euo pipefail -c '
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq
        apt-get install -y -qq --no-install-recommends \
            build-essential cmake pkg-config curl ca-certificates \
            libmpv-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
            libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libdrm-dev libgbm-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev libjack-jackd2-dev \
            libudev-dev libdbus-1-dev libibus-1.0-dev libusb-1.0-0-dev \
            > /dev/null
        [ -x "$HOME/.cargo/bin/cargo" ] ||
            curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
        export PATH="$HOME/.cargo/bin:$PATH"
        cargo build --release --target-dir /tmp/target
        install /tmp/target/release/tiny-media-center dist/
    '

echo
echo "== dist/tiny-media-center =="
echo "-- dynamic dependencies (expect libmpv + system basics, no libSDL3):"
objdump -p dist/tiny-media-center | grep NEEDED
echo "-- minimum glibc:"
objdump -T dist/tiny-media-center | grep -o 'GLIBC_[0-9.]*' | sort -uV | tail -1
'''
