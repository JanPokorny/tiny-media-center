# Builds the portable x86_64 Linux binary and attaches it to a GitHub
# Release. Runs in a Debian 12 container for the same reason as the mise
# `release` task: it pins the two runtime requirements (glibc >= 2.36,
# libmpv.so.2) as low as practical, so the binary runs on Debian 12 /
# Ubuntu 23.04 / Fedora 37 or newer. SDL3 and all Rust deps are linked
# statically; the container needs the dev headers of every SDL backend we
# want compiled in, since SDL dlopens them at runtime.
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container: debian:12
    steps:
      - name: Install build dependencies
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y -qq --no-install-recommends \
              build-essential cmake pkg-config curl ca-certificates git \
              libmpv-dev \
              libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev \
              libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
              libwayland-dev wayland-protocols libdecor-0-dev \
              libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev libdrm-dev libgbm-dev \
              libasound2-dev libpulse-dev libpipewire-0.3-dev libjack-jackd2-dev \
              libudev-dev libdbus-1-dev libibus-1.0-dev libusb-1.0-0-dev

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build --release

      - name: Sanity-check the binary
        run: |
          echo "-- dynamic dependencies (expect libmpv + system basics, no libSDL3):"
          objdump -p target/release/tiny-media-center | grep NEEDED
          if objdump -p target/release/tiny-media-center | grep -q 'NEEDED.*libSDL3'; then
              echo "ERROR: libSDL3 is dynamically linked; expected a static SDL3" >&2
              exit 1
          fi
          echo "-- minimum glibc:"
          glibc=$(objdump -T target/release/tiny-media-center | grep -o 'GLIBC_[0-9.]*' | sort -uV | tail -1)
          echo "$glibc"
          if [ "$(printf '%s\n' "$glibc" GLIBC_2.36 | sort -V | tail -1)" != GLIBC_2.36 ]; then
              echo "ERROR: binary requires $glibc, newer than the documented glibc 2.36 floor" >&2
              exit 1
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiny-media-center
          path: target/release/tiny-media-center

      - name: Attach binary to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/tiny-media-center
          generate_release_notes: true
